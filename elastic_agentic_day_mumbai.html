// === BUILD UI ===
var pillsEl = document.getElementById('pills');
var slidesEl = document.getElementById('slides');

S.forEach(function(s,i){
  // Pill
  var p = document.createElement('button');
  p.className = 'pl' + (i===0?' a':'');
  p.textContent = s.nav;
  p.onclick = function(){go(i)};
  pillsEl.appendChild(p);

  // Slide
  var d = document.createElement('div');
  d.className = 'sd' + (i===0?' a':'');
  d.id = 's'+i;

  var html = '<div class="si">';
  html += '<div class="et '+s.et+'">'+s.etxt+'</div>';
  html += '<div class="eh">'+s.h+'</div>';
  if(s.sub) html += '<div class="es">'+s.sub+'</div>';

  // Agenda
  if(s.agenda){
    var rows = [
      ['9:00','Registration & Networking Breakfast','',''],
      ['9:30','Keynote: The Age of Agentic Enterprise','Chris Walker','k'],
      ['10:00','Customer Keynote / Fireside Chat','BFSI & Digital Native leaders','pn'],
      ['10:30','Agent Builder Deep Dive','Ashish Tiwari','d'],
      ['11:15','Agentic RAG','Abhinav Chauhan, Aish Gunasekar, Ravindra Ramnani',''],
      ['11:45','MCP & A2A: Connecting Agents','Ashish Tiwari','d'],
      ['12:15','Automated RCA & Threat Triage','Ramprasad KM','d'],
      ['1:15','Networking Lunch','','brk'],
      ['2:00','Customer Panel: Jio × NSE','BFSI & Digital Native leaders','pn'],
      ['2:30','Unlocking the Full Potential of Elastic','Amit Vyas',''],
      ['3:00','Governing AI Agents','Bhadriraju Prasanth',''],
      ['3:30','Measuring Agentic ROI','Abhijeet Bhaskar',''],
      ['4:00','Open Standards, No Lock-in','Aashish Mishra',''],
      ['4:30','Closing AMA: Agentic Roadmap','Sanjay Deshmukh, Chris Walker, Ravindra Ramnani','']
    ];
    html += '<div class="ag">';
    rows.forEach(function(r){
      var cls = r[3]==='brk'?' brk':'';
      var badge = '';
      if(r[3]==='k') badge='<span class="bg k">Keynote</span>';
      if(r[3]==='d') badge='<span class="bg d">Demo</span>';
      if(r[3]==='pn') badge='<span class="bg pn">Panel</span>';
      html += '<div class="ar'+cls+'"><div class="at">'+r[0]+'</div><div class="ac"><h4>'+r[1]+badge+'</h4>'+(r[2]?'<p>'+r[2]+'</p>':'')+'</div></div>';
    });
    html += '</div>';
  }

  // Stats
  if(s.stats){
    html += '<div class="sr">';
    s.stats.forEach(function(st){
      html += '<div class="sb"><div class="sn">'+st.n+'</div><div class="sl2">'+st.l+'</div></div>';
    });
    html += '</div>';
  }

  html += '</div>'; // close .si

  // Summary card
  if(s.summary){
    html += '<div class="sum"><h5>'+s.summary.title+'</h5><p>'+s.summary.text+'</p><div class="tg">';
    s.summary.tags.forEach(function(t){ html += '<span>'+t+'</span>'; });
    html += '</div></div>';
  }

  // Prompt box
  html += '<div class="pb"><div class="ph" onclick="tp(this)"><h4>🎯 PPTX Prompt for Claude Desktop <span class="badge">'+s.slides+' slides'+(s.time?' · '+s.time:'')+'</span></h4><div class="ptg">▼</div></div>';
  html += '<div class="pbd"><div class="ptx">'+s.prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
  html += '<button class="cb" onclick="cp(this)">📋 Copy Prompt</button>';
  html += '<div class="pm"><span>Output: .pptx</span><span>Slides: '+s.slides+'</span>'+(s.time?'<span>'+s.time+'</span>':'')+'</div>';
  html += '</div></div>';

  // Nav
  html += '<div class="nv">';
  if(i>0) html += '<button class="nb" onclick="go('+(i-1)+')">← '+S[i-1].nav+'</button>';
  if(i<S.length-1) html += '<button class="nb pr" onclick="go('+(i+1)+')">'+S[i+1].nav+' →</button>';
  else html += '<button class="nb pr" onclick="go(0)">Back to Start →</button>';
  html += '</div>';

  d.innerHTML = html;
  slidesEl.appendChild(d);
});

function go(n){
  document.querySelectorAll('.sd').forEach(function(s){s.classList.remove('a')});
  document.querySelectorAll('.pl').forEach(function(p){p.classList.remove('a')});
  document.getElementById('s'+n).classList.add('a');
  document.querySelectorAll('.pl')[n].classList.add('a');
  window.scrollTo(0,0);
}
function tp(h){h.querySelector('.ptg').classList.toggle('o');h.nextElementSibling.classList.toggle('o')}
function cp(b){navigator.clipboard.writeText(b.previousElementSibling.textContent).then(function(){b.textContent='✅ Copied!';b.classList.add('ok');setTimeout(function(){b.textContent='📋 Copy Prompt';b.classList.remove('ok')},2000)})}
</script>
